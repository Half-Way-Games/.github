name: Bug Report
description: Report something that is broken or behaving incorrectly.
title: '[Bug]: '
labels: ['bug']
type: 'Bug'
body:
  - type: markdown
    attributes:
      value: |
        Fill out as much as you can. The reproduction steps and version are the most important.

  - type: dropdown
    id: severity
    attributes:
      label: 🔴 Severity
      description: How badly does this affect the project?
      options:
        - 'Critical — crash, data loss, or completely broken feature'
        - 'High — major feature broken, no workaround'
        - 'Medium — feature partially broken, workaround exists'
        - 'Low — minor issue, cosmetic, or edge case'
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: 🏷️ Type
      description: What kind of bug is this?
      options:
        - 'Logic / Behavior'
        - 'Visual / Rendering'
        - 'Performance'
        - 'Crash / Freeze'
        - 'Physics / Collision'
        - 'Audio'
        - 'UI / HUD'
        - 'Save / Load'
        - 'Other'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📋 Description
      description: What is wrong? Clearly describe the bug and what it affects.
      placeholder: |
        e.g., When the player collects the last coin on map seed #4, the victory screen never triggers and the game softlocks.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: ✅ Expected Behavior
      description: What should have happened instead?
      placeholder: |
        e.g., Collecting the final coin should emit the `all_coins_collected` event and display the victory screen.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 🔁 Steps to Reproduce
      description: Exact steps to trigger the bug reliably. If it's intermittent, note that and describe the conditions.
      placeholder: |
        1. Start a new game with map seed #4.
        2. Collect all coins except the one in the top-right corner.
        3. Collect the final coin.
        4. Observe — victory screen does not appear.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 🔖 Version
      description: Game or project version where this was first noticed.
      placeholder: 'e.g., v0.4.2 / Godot 4.5'
    validations:
      required: true

  - type: textarea
    id: related_issues
    attributes:
      label: 🔗 Related Issues
      description: Link any related issues, PRs, or previous bug reports.
      placeholder: |
        e.g., Related to #42 (coin collection refactor)
    validations:
      required: false

  - type: textarea
    id: hardware
    attributes:
      label: 💻 Hardware (if relevant)
      description: Fill in what applies — skip anything irrelevant to this bug.
      placeholder: |
        OS: 
        CPU: 
        GPU: 
        RAM: 
        Resolution: 
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional Context
      description: Screenshots, logs, error output, or anything else that helps explain the problem.
    validations:
      required: false
